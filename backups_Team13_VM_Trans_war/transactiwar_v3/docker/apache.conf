ServerTokens Prod
ServerSignature Off
TraceEnable off

# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName localhost
    Redirect permanent / https://10.96.1.250/
</VirtualHost>

# HTTPS VirtualHost
<VirtualHost *:443>
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/selfsigned.key

    # SECURITY: Limit request body size (prevent large payload DoS)
    LimitRequestBody 10485760

    <Directory /var/www/html>
        AllowOverride All
        Options -Indexes -ExecCGI +FollowSymLinks
        Require all granted

        # SECURITY: Limit HTTP methods — only GET, POST, HEAD allowed
        <LimitExcept GET POST HEAD>
            Require all denied
        </LimitExcept>

        # SECURITY: Block access to sensitive files
        <FilesMatch "\.(env|git|sql|md|sh|bak|log|conf|ini|json|lock|xml|yml|yaml)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # SECURITY: Uploads served ONLY through img.php proxy — no direct web access
    <Directory /var/www/html/uploads>
        Require all denied
    </Directory>

    # SECURITY: Block CLI-only scripts from web access
    <Files "create_accounts.php">
        Require all denied
    </Files>

    # SECURITY: Block hidden files and backup files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <FilesMatch "\.(bak|backup|old|orig|tmp|swp|~)$">
        Require all denied
    </FilesMatch>

    <IfModule mod_headers.c>
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "no-referrer"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; media-src 'none';"
        Header always set Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=(), browsing-topics=()"
        Header always set Cross-Origin-Opener-Policy "same-origin"
        Header always set Cross-Origin-Resource-Policy "same-origin"
        Header unset X-Powered-By
        Header unset Server
        Header always unset X-Powered-By
        Header always unset Server
        Header always set Cache-Control "no-store, no-cache, must-revalidate, private, max-age=0"
        Header always set Pragma "no-cache"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# SECURITY: Slowloris / slow-read DoS protection
<IfModule mod_reqtimeout.c>
    RequestReadTimeout header=20-40,minrate=500 body=20-60,minrate=500
</IfModule>
